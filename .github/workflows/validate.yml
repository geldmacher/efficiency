name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  plugin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate plugin
        run: node scripts/validate-plugin.mjs
